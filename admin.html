<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>এডমিন</title><style>
:root{
  --bg:#f4f7fb; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#dbe4ee;
  --brand:#0f4c81; --brand2:#2563eb; --ok:#16a34a; --danger:#dc2626; --shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.topbar{background:linear-gradient(90deg,var(--brand),#123b63);color:#fff}
.topbar-in{max-width:1100px;margin:0 auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.brand-title{font-size:1.15rem;font-weight:800}
.brand-sub{font-size:.9rem;opacity:.9}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a,button,.btn{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none}
.nav a{background:rgba(255,255,255,.12);color:#fff}
.container{max-width:1100px;margin:0 auto;padding:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-top:18px}
.card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.card-b{padding:20px}
.h1{font-size:1.45rem;font-weight:800}
.small{font-size:.92rem;color:var(--muted)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.row{grid-template-columns:1fr}}
label{display:block;margin-bottom:6px;font-weight:700}
input,select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);outline:none}
.btn-primary{background:var(--brand2);color:#fff}
.btn-outline{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn-success{background:var(--ok);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.msg{margin-top:12px;font-weight:700}
.ok{color:var(--ok)} .err{color:var(--danger)}
.balance{background:#eef6ff;border:1px solid #cddfff;border-radius:16px;padding:18px;margin-top:14px}
.balance .amt{font-size:2.1rem;font-weight:900;color:#1d4ed8}
.table-wrap{overflow:auto}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:.93rem;vertical-align:top}
.table th{color:var(--muted);font-weight:800}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.hero{grid-template-columns:1fr}}
.info-box{background:linear-gradient(180deg,#f8fbff,#fff);border:1px solid var(--line);border-radius:16px;padding:18px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.hidden{display:none!important}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.tile-top{padding:16px}
.tile-title{font-weight:800;font-size:1.05rem}
.tile-sub{color:var(--muted);font-size:.92rem;margin-top:4px}
.tile-b{padding:0 16px 16px}
.red-alert{background:#fff1f2;border:1px solid #fecdd3;color:#b91c1c;padding:14px 16px;border-radius:14px;font-weight:800}
</style></head><body>
<div class="topbar"><div class="topbar-in"><div><div class="brand-title">সিএমএস পোর্টাল</div><div class="brand-sub">লগইন • ব্যালেন্স • Withdraw Request</div></div><div class="nav"><a href="/index.html">হোম</a><a href="/dashboard.html">ড্যাশবোর্ড</a><a href="/admin.html">এডমিন</a><a href="/setup.html">সেটআপ</a></div></div></div>
<div class="container"><div class="card"><div class="card-h"><div><div class="h1">এডমিন প্যানেল</div><div class="small">Bonus Add + Pending Withdraw Approve / Reject</div></div><button id="reloadBtn" class="btn btn-outline">রিফ্রেশ</button></div><div class="card-b"><div id="aMsg" class="msg"></div><div class="card"><div class="card-h"><div style="font-weight:800">Bonus যোগ</div></div><div class="card-b"><div class="row"><div><label>Target User ID</label><input id="bUser"></div><div><label>Amount</label><input id="bAmount" type="number" min="1"></div><div style="grid-column:1/-1"><label>Note</label><input id="bNote" value="কমিউনিটি বোনাস"></div></div><button id="bBtn" class="btn btn-success" style="width:100%;margin-top:14px">Bonus Add</button><div id="bMsg" class="msg"></div></div></div><div class="card"><div class="card-h"><div style="font-weight:800">Pending Withdraw Requests</div></div><div class="card-b table-wrap"><table class="table"><thead><tr><th>সময়</th><th>User</th><th>Method</th><th>Number</th><th>Amount</th><th>Note</th><th>Action</th></tr></thead><tbody id="reqBody"></tbody></table></div></div></div></div></div><script>const $=id=>document.getElementById(id); async function load(){ const res=await fetch('/api/admin-withdraw-list'); const j=await res.json(); if(!j.ok){ $('aMsg').className='msg err'; $('aMsg').textContent=j.error||'Access denied'; return; } $('aMsg').textContent=''; $('reqBody').innerHTML=(j.rows||[]).map(r=>`<tr><td>${new Date(r.created_at).toLocaleString()}</td><td><strong>${r.user?.user_id||'?'}</strong><div class="small">${r.user?.name||''}</div></td><td>${r.method}</td><td>${r.payout_number}</td><td><strong>${Number(r.amount).toFixed(2)}</strong></td><td>${r.note||''}</td><td><button class="btn btn-success" onclick="decide('${r.id}','approve')">Approve</button> <button class="btn btn-danger" onclick="decide('${r.id}','reject')">Reject</button></td></tr>`).join('') || '<tr><td colspan="7">কোনো pending request নেই</td></tr>'; } window.decide=async(id,action)=>{ const admin_note=prompt(action==='approve'?'টাকা পাঠিয়েছেন? note লিখুন':'Reject কারণ লিখুন'); if(admin_note===null) return; const res=await fetch('/api/admin-withdraw-decide',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id,action,admin_note})}); const j=await res.json(); $('aMsg').className='msg '+(j.ok?'ok':'err'); $('aMsg').textContent=j.ok?j.message:(j.error||'Failed'); if(j.ok) load(); }; $('reloadBtn').onclick=load; $('bBtn').onclick=async()=>{ const res=await fetch('/api/admin-add-bonus',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({target_user_id:$('bUser').value,amount:Number($('bAmount').value),note:$('bNote').value})}); const j=await res.json(); $('bMsg').className='msg '+(j.ok?'ok':'err'); $('bMsg').textContent=j.ok?j.message:(j.error||'Failed'); }; load();</script></body></html>
